version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: q2-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: q2_db
    command: ["--auth"]
    networks:
      - q2-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})", "-u", "admin", "-p", "admin", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    container_name: q2-influx
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345678
      DOCKER_INFLUXDB_INIT_ORG: q2org
      DOCKER_INFLUXDB_INIT_BUCKET: realtime
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: q2-influx-token
      DOCKER_INFLUXDB_INIT_RETENTION: 168h
    networks:
      - q2-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
  influx_data:

networks:
  q2-net:
    driver: bridge
